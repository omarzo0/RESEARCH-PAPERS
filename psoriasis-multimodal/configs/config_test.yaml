# =============================================================================
# Psoriasis Biologic Response Prediction — Config for End-to-End Validation
# =============================================================================

seed: 42

# ── Data ─────────────────────────────────────────────────────────────────────
data:
  raw_dir: data/raw
  processed_dir: data/processed
  splits_dir: data/splits
  image_size: 224
  imagenet_mean: [0.485, 0.456, 0.406]
  imagenet_std: [0.229, 0.224, 0.225]
  blur_threshold: 100          # Laplacian variance below this → blurry
  duplicate_hash_threshold: 5  # Hamming distance for near-duplicate detection
  train_ratio: 0.70
  val_ratio: 0.15
  test_ratio: 0.15
  num_workers: 0               # Use 0 workers in validation test to avoid any multiprocess delays on Mac

# ── Augmentation (training set only) ────────────────────────────────────────
augmentation:
  horizontal_flip: true
  vertical_flip: true
  brightness: 0.2
  contrast: 0.2
  saturation: 0.1
  rotation_limit: 15
  crop_scale_min: 0.8
  crop_scale_max: 1.0
  cutmix_alpha: 0.4
  mixup_alpha: 0.4

# ── Training ────────────────────────────────────────────────────────────────
training:
  batch_size: 4
  epochs: 2                    # 2 epochs for test validation
  early_stopping_patience: 2
  early_stopping_monitor: val_auc
  label_smoothing: 0.1
  mixed_precision: false       # Use standard precision on MPS / Mac CPU to avoid warnings
  gradient_clip_max_norm: 1.0

# ── Optimizer ───────────────────────────────────────────────────────────────
optimizer:
  name: adamw
  backbone_lr: 1.0e-4
  head_lr: 1.0e-3
  weight_decay: 0.01

# ── Scheduler ───────────────────────────────────────────────────────────────
scheduler:
  name: cosine_annealing_warm_restarts
  T_0: 2
  T_mult: 1
  eta_min: 1.0e-6

# ── Models ──────────────────────────────────────────────────────────────────
models:
  efficientnet:
    name: efficientnet_b3
    pretrained: true
    unfreeze_blocks: 1
    dropout: 0.4
    head_dims: [1536, 512, 256, 2]

  vit:
    name: vit_base_patch16_224
    pretrained: true
    lora_rank: 8
    lora_alpha: 16
    dropout: 0.3
    head_dims: [768, 256, 2]

  resnet50:
    name: resnet50
    pretrained: true
    fine_tune_layers: 1

  densenet121:
    name: densenet121
    pretrained: true
    full_fine_tune: true

  vgg16:
    name: vgg16
    pretrained: true
    fine_tune_fc_only: true

# ── Optuna Hyperparameter Search ────────────────────────────────────────────
optuna:
  n_trials: 2
  sampler: tpe
  pruner: median
  search_space:
    lr: [1.0e-5, 1.0e-3]
    dropout: [0.2, 0.5]
    weight_decay: [1.0e-4, 1.0e-1]
    batch_size: [4, 8]
  search_epochs: 2

# ── Cross-Validation ───────────────────────────────────────────────────────
cross_validation:
  n_folds: 2
  stratified: true

# ── Weights & Biases ───────────────────────────────────────────────────────
wandb:
  enabled: false
  project: psoriasis-biologic-response
  entity: null

# ── Paths ───────────────────────────────────────────────────────────────────
paths:
  checkpoints: checkpoints/
  results: results/
  figures: results/figures/
  logs: logs/

# ── Label Mapping ──────────────────────────────────────────────────────────
label_mapping:
  Mild: 0
  Moderate: 1
  Severe: 1
  class_names: ["Non-Responder", "Responder"]
